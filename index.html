<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="Startpage">
    <meta name="author" content="Valleloper">
    <title>Startpage</title>
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <link rel="icon" href="img/app-icon.ico" type="image/x-icon">
    <script src="js/jquery.min.js" type="text/javascript"></script>
    <script src="js/bootstrap.bundle.min.js" type="text/javascript"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="js/links.js" type="text/javascript"></script>
    <script src="js/startpage.js" type="text/javascript"></script>
</head>

<body>

<div id="toast-container"></div>

<div class="menu-overlay" id="modal-overlay"></div>
<div id="edit-modal" class="card shadow-lg hidden">
    <h3 id="modal-title" class="mb-4">Edit Item</h3>
    <div id="modal-body"></div>
    <div class="d-flex justify-content-end mt-4">
        <button class="btn btn-link text-muted mr-2" id="modal-cancel">Cancel</button>
        <button class="btn btn-primary px-4" id="modal-save" style="border-radius: 20px;">Save</button>
    </div>
</div>

<div class="menu-overlay" id="menu-overlay"></div>

<nav id="settings-menu">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="mb-0 ui-settings-title">Settings</h3>
        <button class="settings-btn" id="close-menu" style="opacity: 1;">✕</button>
    </div>
    
    <div class="mb-4">
        <label class="d-block mb-2 ui-label-theme">Theme</label>
        <div class="d-flex align-items-center">
            <select id="theme-setting" class="form-control mr-2"></select>
            <button id="add-theme-btn" class="btn btn-sm btn-outline-primary mr-1" title="Add Theme">+</button>
            <button id="edit-theme-btn" class="btn btn-sm btn-outline-secondary mr-1" title="Edit Theme">✎</button>
            <button id="delete-theme-btn" class="btn btn-sm btn-outline-danger" title="Delete Theme">✕</button>
        </div>
    </div>

    <div class="mb-4">
        <label class="d-block mb-2 ui-label-lang">Language</label>
        <div id="language-selector" class="d-flex justify-content-between">
            <button class="btn btn-light lang-flag-btn" data-lang="de" title="Deutsch"><img src="img/flags/de.svg" alt="DE" style="height: 20px; border-radius: 2px;"></button>
            <button class="btn btn-light lang-flag-btn" data-lang="en" title="English"><img src="img/flags/en.svg" alt="EN" style="height: 20px; border-radius: 2px;"></button>
            <button class="btn btn-light lang-flag-btn" data-lang="es" title="Español"><img src="img/flags/es.svg" alt="ES" style="height: 20px; border-radius: 2px;"></button>
            <button class="btn btn-light lang-flag-btn" data-lang="it" title="Italiano"><img src="img/flags/it.svg" alt="IT" style="height: 20px; border-radius: 2px;"></button>
        </div>
    </div>

    <div class="mb-4">
        <label id="ui-scale-label" class="d-block mb-2">Scale</label>
        <input type="range" id="ui-scale-setting" class="w-100" min="0.7" max="1.3" step="0.05" value="1.0">
    </div>

    <div class="custom-control custom-switch mb-4">
        <input type="checkbox" class="custom-control-input" id="open-in-new-tab-setting">
        <label class="custom-control-label ui-label-newtab" for="open-in-new-tab-setting">Open in new tab</label>
    </div>

    <div class="mb-3 border-top pt-3">
        <label class="d-block mb-2 ui-label-greeting-mode" style="font-weight: bold; font-size: 0.85rem;">Greeting Mode</label>
        <select id="greeting-mode-setting" class="custom-select mb-2" style="border-radius: 10px;">
            <option value="dynamic">Time-based (Dynamic)</option>
            <option value="static">Static Text</option>
            <option value="none">None (Hidden)</option>
        </select>
        
        <input type="text" id="static-greeting-input" class="form-control mb-2 hidden" placeholder="Enter greeting..." style="border-radius: 10px;">
        
        <div class="custom-control custom-switch mb-3">
            <input type="checkbox" class="custom-control-input" id="show-username-setting" checked>
            <label class="custom-control-label ui-label-show-username" for="show-username-setting">Show Username</label>
        </div>
    </div>

    <button id="edit-username-btn" class="btn btn-outline-primary btn-block mb-2" style="border-radius: 10px;">Edit Username</button>
    <button id="edit-location-btn" class="btn btn-outline-primary btn-block mb-2" style="border-radius: 10px;">Edit Location</button>
    <button id="edit-greetings-btn" class="btn btn-outline-primary btn-block mb-4" style="border-radius: 10px;">Edit Time Frames</button>

    <div class="mb-4 border-top pt-4">
        <label class="d-block mb-2 ui-label-backup" style="font-weight: bold; text-transform: uppercase; font-size: 0.8rem; opacity: 0.7;">Persistence</label>
        <button id="export-btn" class="btn btn-primary btn-block mt-2 py-2" style="border-radius: 12px; font-weight: 600;">Änderungen dauerhaft speichern</button>
        <button id="reload-file-btn" class="btn btn-outline-secondary btn-block mt-2 py-2" style="border-radius: 12px; font-weight: 600;">Aus Datei laden</button>
        <small class="text-muted d-block mt-2 text-center persistence-desc" style="font-size: 0.7rem;">Schreibt alle Änderungen direkt in die <b>links.js</b> Datei.</small>
    </div>
</nav>

<main role="main">
    <div id="top">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-7">
                    <h1 id="welcome_header" class="display-4 font-weight-bold mb-0">
                        <span id="greeting_text"></span><span id="user_name_text"></span>
                    </h1>
                </div>
                <div class="col-md-5 d-flex align-items-center justify-content-end">
                    <div class="search-wrapper mr-3">
                        <input id="search-input" type="text" placeholder="Search..." autofocus/>
                        <button id="search-clear" class="hidden">✕</button>
                    </div>
                    <button id="main-edit-btn" class="edit-btn-apple mr-2" title="Edit">✎</button>
                    <button class="settings-btn" id="open-menu" title="Settings">⚙</button>
                </div>
            </div>
            
            <div class="row mt-4" id="short-links-header">
                <div class="col-12 mb-2">
                    <h5 class="text-muted d-flex align-items-center">
                        <span class="ui-label-favorites mr-2">Favorites</span> 
                        <button class="btn btn-sm btn-success" id="add-short-link-btn" style="border-radius: 50%; width: 24px; height: 24px; padding: 0; line-height: 1;">+</button>
                    </h5>
                </div>
            </div>
            <div class="row short-links pt-2" id="short-links"></div>
            <div class="row mt-3" id="widgets-container">
            </div>
        </div>
    </div>

    <div class="container margin-bottom">
        <div class="row margin-bottom selection-buttons" id="category-buttons"></div>
        <div id="panels-container"></div>
    </div>
</main>

</body>
</html>
